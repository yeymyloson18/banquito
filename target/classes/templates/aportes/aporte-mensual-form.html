<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registrar aporte mensual</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width: 480px;">
    <h1 class="h4 mb-3">Registrar aporte mensual</h1>
    <p class="text-muted">Socio <span th:text="${socioId}">1</span> — Periodo <span th:text="${periodoId}">1</span></p>

    <div class="alert alert-info">
        Deuda acumulada actual: <strong>S/ <span th:text="${deudaAcumulada}">0.00</span></strong>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/socios/{socioId}/periodos/{periodoId}/aporte-mensual(socioId=${socioId},periodoId=${periodoId})}"
          th:object="${aporteMensualRequest}" method="post">
        <div class="mb-3">
            <label class="form-label" for="mesHasta">Pagar hasta el mes (AAAA-MM)</label>
            <input type="month" class="form-control" id="mesHasta" th:field="*{mesHasta}">
            <div class="text-danger" th:if="${#fields.hasErrors('mesHasta')}" th:errors="*{mesHasta}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" for="montoPagado">Monto pagado (S/)</label>
            <input type="number" step="0.01" class="form-control" id="montoPagado" th:field="*{montoPagado}">
            <div class="text-danger" th:if="${#fields.hasErrors('montoPagado')}" th:errors="*{montoPagado}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" for="fecha">Fecha de pago</label>
            <input type="date" class="form-control" id="fecha" th:field="*{fecha}">
            <div class="text-danger" th:if="${#fields.hasErrors('fecha')}" th:errors="*{fecha}"></div>
        </div>
        <button type="submit" class="btn btn-primary w-100">Registrar pago</button>
    </form>
</div>
</body>
</html>
