<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registrar aporte inicial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width: 480px;">
    <h1 class="h4 mb-3">Registrar aporte inicial</h1>
    <p class="text-muted">Socio <span th:text="${socioId}">1</span> — Periodo <span th:text="${periodoId}">1</span></p>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/socios/{socioId}/periodos/{periodoId}/aporte-inicial(socioId=${socioId},periodoId=${periodoId})}"
          th:object="${aporteInicialRequest}" method="post">
        <div class="mb-3">
            <label class="form-label" for="monto">Monto (S/)</label>
            <input type="number" step="0.01" class="form-control" id="monto" th:field="*{monto}">
            <div class="text-danger" th:if="${#fields.hasErrors('monto')}" th:errors="*{monto}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" for="fecha">Fecha</label>
            <input type="date" class="form-control" id="fecha" th:field="*{fecha}">
            <div class="text-danger" th:if="${#fields.hasErrors('fecha')}" th:errors="*{fecha}"></div>
        </div>
        <button type="submit" class="btn btn-primary w-100">Registrar</button>
    </form>
</div>
</body>
</html>
